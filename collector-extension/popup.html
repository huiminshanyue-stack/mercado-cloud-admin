<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><style>
body{font:13px Arial;width:330px;padding:16px;color:#263238}h2{font-size:17px;margin:0 0 12px}input,select{width:100%;box-sizing:border-box;padding:8px;margin:5px 0;border:1px solid #ccc;border-radius:5px}button{border:0;border-radius:5px;padding:8px 12px;margin:6px 4px 0 0;cursor:pointer}.primary{background:#1976d2;color:#fff}.danger{background:#e53935;color:#fff}.box{background:#f5f7fa;padding:10px;border-radius:6px;margin-top:10px;line-height:1.6}.warn{color:#d97706}.ok{color:#14833b}small{color:#78909c}</style></head>
<body><h2>🌐 美客多国际购采集器</h2>
<div id="loginBox"><input id="username" placeholder="云后台管理员账号"><input id="password" type="password" placeholder="云后台管理员密码"><button id="login" class="primary">连接云后台</button></div>
<div id="controlBox" hidden><select id="country"><option value="BR">巴西</option><option value="CO">哥伦比亚</option><option value="CL">智利</option><option value="MX">墨西哥</option></select>
<label>每页间隔（秒）</label><input id="delay" type="number" min="2" max="120" value="5"><button id="start" class="primary">开始/继续采集</button><button id="stop" class="danger">暂停</button><button id="logout">断开</button></div>
<div class="box" id="status">尚未连接</div><small>验证码或登录页面出现时会自动暂停，请完成验证后点击“开始/继续采集”。</small>
<script src="popup.js"></script></body></html>
