<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美客多 - 云端管理后台</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/theme-chalk/index.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f7fa; }
    .app-header {
      background: linear-gradient(135deg, #409EFF, #337ecc);
      color: white; padding: 20px 30px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
    }
    .app-header h1 { font-size: 22px; font-weight: 600; }
    .app-header .sub { font-size: 13px; opacity: .8; margin-top: 4px; }
    .app-container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
    .el-tabs { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .toolbar h3 { font-size: 16px; color: #303133; }
    .el-table th { background: #f0f5ff !important; color: #409EFF; }
    .tag-admin { background: #fef0f0; color: #f56c6c; border: 1px solid #fbc4c4; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    .tag-user { background: #f0f9eb; color: #67c23a; border: 1px solid #c2e7b0; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    .sync-bar {
      background: #fff; border-radius: 8px; padding: 12px 20px; margin-bottom: 16px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .sync-bar .info { display: flex; align-items: center; gap: 16px; font-size: 13px; color: #909399; }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .sync-dot.online { background: #67c23a; }
    .sync-dot.offline { background: #f56c6c; }
    .footer-bar {
      text-align: center; color: #c0c4cc; font-size: 12px;
      margin-top: 30px; padding: 20px;
    }
    @media (max-width: 768px) {
      .app-container { padding: 0 10px; }
      .el-tabs { padding: 12px; }
    }
    .el-dialog { border-radius: 8px; }
    .empty-hint { color: #c0c4cc; font-size: 13px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-header">
      <div>
        <h1>📡 美客多爆品选品雷达</h1>
        <div class="sub">云端管理后台 — 随时随地管理用户和广告</div>
      </div>
    </div>

    <div class="app-container">
      <div class="sync-bar">
        <div class="info">
          <span><span class="sync-dot" :class="online ? 'online' : 'offline'"></span> 服务状态</span>
          <span>📋 用户数: {{ users.length }}</span>
          <span>📢 广告数: {{ ads.length }}</span>
          <span>🔢 数据版本: v{{ currentVersion }}</span>
        </div>
        <div>
          <el-button size="small" @click="refreshAll" :loading="loading">
            🔄 刷新数据
          </el-button>
        </div>
      </div>

      <el-tabs v-model="activeTab">
        <!-- ===== 用户管理 ===== -->
        <el-tab-pane label="👥 用户管理" name="users">
          <div class="toolbar">
            <h3>用户列表 ({{ users.length }})</h3>
            <el-button type="primary" size="small" @click="showAddUserDialog">
              ＋ 添加用户
            </el-button>
          </div>
          <el-table :data="users" stripe border size="small" empty-text="暂无用户">
            <el-table-column prop="id" label="ID" width="60" />
            <el-table-column prop="username" label="用户名" min-width="120" />
            <el-table-column prop="nickname" label="昵称" min-width="120" />
            <el-table-column label="角色" width="100">
              <template #default="{ row }">
                <span :class="row.role === 'admin' ? 'tag-admin' : 'tag-user'">
                  {{ row.role === 'admin' ? '管理员' : '普通用户' }}
                </span>
              </template>
            </el-table-column>
            <el-table-column prop="created_at" label="创建时间" width="170" />
            <el-table-column label="操作" width="180" fixed="right">
              <template #default="{ row }">
                <el-button type="warning" size="small" @click="showEditUserDialog(row)">修改</el-button>
                <el-button type="danger" size="small" :disabled="row.id === 1" @click="deleteUser(row)">
                  {{ row.id === 1 ? '不可删除' : '删除' }}
                </el-button>
              </template>
            </el-table-column>
          </el-table>
        </el-tab-pane>

        <!-- ===== 广告管理 ===== -->
        <el-tab-pane label="📢 广告管理" name="ads">
          <div class="toolbar">
            <h3>广告列表 ({{ ads.length }})</h3>
            <el-button type="primary" size="small" @click="showAddAdDialog">
              ＋ 添加广告
            </el-button>
          </div>
          <el-table :data="ads" stripe border size="small" empty-text="暂无广告">
            <el-table-column prop="id" label="ID" width="60" />
            <el-table-column prop="title" label="标题" min-width="140" />
            <el-table-column prop="content" label="内容" min-width="160" show-overflow-tooltip />
            <el-table-column label="启用" width="70">
              <template #default="{ row }">
                <el-tag :type="row.enabled ? 'success' : 'info'" size="small">
                  {{ row.enabled ? '是' : '否' }}
                </el-tag>
              </template>
            </el-table-column>
            <el-table-column label="弹窗" width="70">
              <template #default="{ row }">
                <el-tag :type="row.isPopup ? 'warning' : 'info'" size="small">
                  {{ row.isPopup ? '是' : '否' }}
                </el-tag>
              </template>
            </el-table-column>
            <el-table-column label="操作" width="200" fixed="right">
              <template #default="{ row }">
                <el-button type="warning" size="small" @click="showEditAdDialog(row)">编辑</el-button>
                <el-button type="danger" size="small" @click="deleteAd(row)">删除</el-button>
              </template>
            </el-table-column>
          </el-table>
        </el-tab-pane>
      </el-tabs>

      <div class="footer-bar">
        美客多爆品选品雷达 · 云端管理后台 v1.0 · 修改后实时同步到本地
      </div>
    </div>

    <!-- ===== 添加/修改用户对话框 ===== -->
    <el-dialog v-model="userDialog.visible" :title="userDialog.isEdit ? '修改用户' : '添加用户'" width="420px">
      <el-form label-width="80px" size="small">
        <el-form-item label="用户名" required>
          <el-input v-model="userDialog.form.username" :disabled="userDialog.isEdit" placeholder="登录用" />
        </el-form-item>
        <el-form-item label="密码" :required="!userDialog.isEdit">
          <el-input v-model="userDialog.form.password" type="password" show-password
            :placeholder="userDialog.isEdit ? '留空则不修改' : '必填'" />
        </el-form-item>
        <el-form-item label="昵称">
          <el-input v-model="userDialog.form.nickname" placeholder="显示名称" />
        </el-form-item>
        <el-form-item label="角色">
          <el-radio-group v-model="userDialog.form.role">
            <el-radio value="user">普通用户</el-radio>
            <el-radio value="admin">管理员</el-radio>
          </el-radio-group>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button size="small" @click="userDialog.visible = false">取消</el-button>
        <el-button type="primary" size="small" @click="submitUser" :loading="userDialog.loading">
          确认
        </el-button>
      </template>
    </el-dialog>

    <!-- ===== 添加/修改广告对话框 ===== -->
    <el-dialog v-model="adDialog.visible" :title="adDialog.isEdit ? '编辑广告' : '添加广告'" width="480px">
      <el-form label-width="80px" size="small">
        <el-form-item label="标题" required>
          <el-input v-model="adDialog.form.title" placeholder="广告标题" />
        </el-form-item>
        <el-form-item label="内容">
          <el-input v-model="adDialog.form.content" type="textarea" :rows="3" placeholder="广告内容文字" />
        </el-form-item>
        <el-form-item label="图片链接">
          <el-input v-model="adDialog.form.imageUrl" placeholder="https://..." />
        </el-form-item>
        <el-form-item label="跳转链接">
          <el-input v-model="adDialog.form.linkUrl" placeholder="点击广告跳转的网址" />
        </el-form-item>
        <el-form-item label="启用">
          <el-switch v-model="adDialog.form.enabled" />
        </el-form-item>
        <el-form-item label="弹窗广告">
          <el-switch v-model="adDialog.form.isPopup" />
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button size="small" @click="adDialog.visible = false">取消</el-button>
        <el-button type="primary" size="small" @click="submitAd" :loading="adDialog.loading">
          确认
        </el-button>
      </template>
    </el-dialog>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script>
    const { createApp, ref, reactive, onMounted } = Vue;

    const app = createApp({
      setup() {
        const activeTab = ref('users');
        const users = ref([]);
        const ads = ref([]);
        const loading = ref(false);
        const online = ref(true);
        const currentVersion = ref(0);

        // 用户对话框状态
        const userDialog = reactive({
          visible: false, isEdit: false, loading: false,
          form: { username: '', password: '', nickname: '', role: 'user' },
          editId: null
        });

        // 广告对话框状态
        const adDialog = reactive({
          visible: false, isEdit: false, loading: false,
          form: { title: '', content: '', imageUrl: '', linkUrl: '', enabled: true, isPopup: false },
          editId: null
        });

        async function api(url, method = 'GET', data = null) {
          try {
            const config = { method, url };
            if (data) config.data = data;
            const res = await axios(config);
            online.value = true;
            return res.data;
          } catch (e) {
            online.value = false;
            ElementPlus.ElMessage.error('连接云端失败: ' + e.message);
            return null;
          }
        }

        async function fetchUsers() {
          const res = await api('/api/users');
          if (res?.code === 0) users.value = res.data;
        }

        async function fetchAds() {
          const res = await api('/api/ads');
          if (res?.code === 0) ads.value = res.data;
        }

        async function refreshAll() {
          loading.value = true;
          await Promise.all([fetchUsers(), fetchAds()]);

          const health = await api('/api/health');
          if (health?.code === 0) {
            currentVersion.value = health.data.version;
            online.value = true;
          }
          loading.value = false;
        }

        // ===== 用户操作 =====
        function showAddUserDialog() {
          userDialog.isEdit = false;
          userDialog.form = { username: '', password: '', nickname: '', role: 'user' };
          userDialog.editId = null;
          userDialog.visible = true;
        }

        function showEditUserDialog(row) {
          userDialog.isEdit = true;
          userDialog.form = { username: row.username, password: '', nickname: row.nickname, role: row.role };
          userDialog.editId = row.id;
          userDialog.visible = true;
        }

        async function submitUser() {
          if (!userDialog.isEdit && !userDialog.form.username) {
            ElementPlus.ElMessage.warning('请输入用户名');
            return;
          }
          if (!userDialog.isEdit && !userDialog.form.password) {
            ElementPlus.ElMessage.warning('请输入密码');
            return;
          }
          userDialog.loading = true;
          let res;
          if (userDialog.isEdit) {
            res = await api(`/api/users/${userDialog.editId}`, 'PUT', userDialog.form);
          } else {
            res = await api('/api/users', 'POST', userDialog.form);
          }
          userDialog.loading = false;
          if (res?.code === 0) {
            ElementPlus.ElMessage.success(res.message);
            userDialog.visible = false;
            await refreshAll();
          } else {
            ElementPlus.ElMessage.error(res?.message || '操作失败');
          }
        }

        async function deleteUser(row) {
          try {
            await ElementPlus.ElMessageBox.confirm(`确定删除用户「${row.username}」？`, '确认删除', {
              type: 'warning', confirmButtonText: '删除', cancelButtonText: '取消'
            });
            const res = await api(`/api/users/${row.id}`, 'DELETE');
            if (res?.code === 0) {
              ElementPlus.ElMessage.success(res.message);
              await refreshAll();
            } else {
              ElementPlus.ElMessage.error(res?.message || '删除失败');
            }
          } catch (e) { /* 取消 */ }
        }

        // ===== 广告操作 =====
        function showAddAdDialog() {
          adDialog.isEdit = false;
          adDialog.form = { title: '', content: '', imageUrl: '', linkUrl: '', enabled: true, isPopup: false };
          adDialog.editId = null;
          adDialog.visible = true;
        }

        function showEditAdDialog(row) {
          adDialog.isEdit = true;
          adDialog.form = {
            title: row.title, content: row.content || '',
            imageUrl: row.imageUrl || '', linkUrl: row.linkUrl || '',
            enabled: !!row.enabled, isPopup: !!row.isPopup
          };
          adDialog.editId = row.id;
          adDialog.visible = true;
        }

        async function submitAd() {
          if (!adDialog.form.title) {
            ElementPlus.ElMessage.warning('请输入广告标题');
            return;
          }
          adDialog.loading = true;
          let res;
          if (adDialog.isEdit) {
            res = await api(`/api/ads/${adDialog.editId}`, 'PUT', adDialog.form);
          } else {
            res = await api('/api/ads', 'POST', adDialog.form);
          }
          adDialog.loading = false;
          if (res?.code === 0) {
            ElementPlus.ElMessage.success(res.message);
            adDialog.visible = false;
            await refreshAll();
          } else {
            ElementPlus.ElMessage.error(res?.message || '操作失败');
          }
        }

        async function deleteAd(row) {
          try {
            await ElementPlus.ElMessageBox.confirm(`确定删除广告「${row.title}」？`, '确认删除', {
              type: 'warning', confirmButtonText: '删除', cancelButtonText: '取消'
            });
            const res = await api(`/api/ads/${row.id}`, 'DELETE');
            if (res?.code === 0) {
              ElementPlus.ElMessage.success(res.message);
              await refreshAll();
            } else {
              ElementPlus.ElMessage.error(res?.message || '删除失败');
            }
          } catch (e) { /* 取消 */ }
        }

        onMounted(() => {
          refreshAll();
          // 每5秒自动刷新版本检测
          setInterval(async () => {
            const res = await api('/api/health', 'GET');
            if (res?.code === 0 && res.data.version !== currentVersion.value) {
              currentVersion.value = res.data.version;
              await refreshAll();
            }
          }, 5000);
        });

        return {
          activeTab, users, ads, loading, online, currentVersion,
          userDialog, adDialog,
          showAddUserDialog, showEditUserDialog, submitUser, deleteUser,
          showAddAdDialog, showEditAdDialog, submitAd, deleteAd,
          refreshAll
        };
      }
    });

    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
