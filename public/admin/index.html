<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美客多云管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
/* Login */
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a73e8,#0d47a1)}
.login-box{background:#fff;padding:40px;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.15);width:380px}
.login-box h2{text-align:center;margin-bottom:8px;color:#1a73e8;font-size:22px}
.login-box p{text-align:center;color:#888;font-size:13px;margin-bottom:24px}
.login-box input{width:100%;padding:10px 14px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;margin-bottom:14px;outline:none;transition:border-color .2s}
.login-box input:focus{border-color:#1a73e8}
.login-box .btn{width:100%;padding:10px;background:#1a73e8;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer}
.login-box .btn:hover{background:#1557b0}
.login-box .btn:disabled{opacity:.6;cursor:not-allowed}
.login-box .err{color:#e53935;font-size:13px;margin-top:8px;text-align:center}
.login-box .hint{text-align:center;color:#999;font-size:12px;margin-top:12px}
/* Layout */
.admin-layout{display:flex;min-height:100vh}
.sidebar{width:200px;background:#001529;color:#fff;flex-shrink:0;display:flex;flex-direction:column}
.sidebar h3{padding:18px 16px;font-size:15px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar .nav{padding:8px 0;flex:1}
.sidebar .nav-item{padding:10px 20px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.7);transition:all .2s;display:flex;align-items:center;gap:8px}
.sidebar .nav-item:hover{color:#fff;background:rgba(255,255,255,.06)}
.sidebar .nav-item.active{color:#fff;background:#1890ff}
.sidebar .logout-btn{padding:12px 20px;border-top:1px solid rgba(255,255,255,.1);cursor:pointer;font-size:13px;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:8px}
.sidebar .logout-btn:hover{color:#ff4d4f}
.main-area{flex:1;overflow-y:auto;padding:24px;background:#f0f2f5}
.main-area h2{font-size:20px;margin-bottom:20px}
/* Components */
.card{background:#fff;border-radius:8px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);text-align:center}
.stat-card .num{font-size:28px;font-weight:700;color:#1a73e8}
.stat-card .lbl{font-size:12px;color:#888;margin-top:4px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid #f0f0f0;white-space:nowrap}
th{background:#fafafa;font-weight:600;color:#555;position:sticky;top:0;z-index:1}
tr:hover td{background:#f5f7fa}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border:none;border-radius:4px;font-size:12px;cursor:pointer;transition:all .2s}
.btn-primary{background:#1a73e8;color:#fff}
.btn-primary:hover{background:#1557b0}
.btn-success{background:#52c41a;color:#fff}
.btn-success:hover{background:#49a817}
.btn-danger{background:#ff4d4f;color:#fff}
.btn-danger:hover{background:#d9363e}
.btn-warning{background:#faad14;color:#fff}
.btn-warning:hover{background:#d99a0e}
.btn-sm{padding:4px 10px;font-size:11px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.mr-2{margin-right:8px}
.mt-2{margin-top:12px}
.mb-2{margin-bottom:12px}
.flex{display:flex;align-items:center;gap:8px}
.flex-wrap{flex-wrap:wrap}
.gap-2{gap:8px}
.text-right{text-align:right}
/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:8px;width:520px;max-width:90vw;max-height:80vh;overflow-y:auto;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal h3{font-size:16px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #f0f0f0}
.modal .field{margin-bottom:12px}
.modal label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.modal input,.modal select,.modal textarea{width:100%;padding:8px 10px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;outline:none}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:#1a73e8}
.modal .btns{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid #f0f0f0}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:6px;color:#fff;font-size:13px;z-index:2000;animation:fadeIn .3s;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.success{background:#52c41a}
.toast.error{background:#ff4d4f}
.toast.info{background:#1890ff}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
/* Tags */
.tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:500}
.tag-green{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.tag-red{background:#fff2f0;color:#ff4d4f;border:1px solid #ffccc7}
.tag-blue{background:#e6f7ff;color:#1890ff;border:1px solid #91d5ff}
.tag-admin{background:#fff7e6;color:#fa8c16;border:1px solid #ffd591}
.tag-warning{background:#fffbe6;color:#d48806;border:1px solid #ffe58f}
/* Search */
.search-bar{display:flex;gap:8px;margin-bottom:12px}
.search-bar input{flex:1;padding:8px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;outline:none}
.search-bar input:focus{border-color:#1a73e8}
.pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:12px;font-size:13px}
.pagination button{padding:4px 12px;border:1px solid #d9d9d9;background:#fff;border-radius:4px;cursor:pointer}
.pagination button:hover{background:#f5f5f5}
.pagination button:disabled{opacity:.4;cursor:not-allowed}
.pagination span{color:#888}
/* Tab */
.tabs{display:flex;gap:0;border-bottom:2px solid #e8e8e8;margin-bottom:20px}
.tab{padding:10px 20px;cursor:pointer;font-size:13px;color:#666;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab:hover{color:#1a73e8}
.tab.active{color:#1a73e8;border-bottom-color:#1a73e8;font-weight:600}
.country-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.country-tabs button.active{background:#1a73e8;color:#fff;border-color:#1a73e8}
.status-box{padding:10px 14px;border-radius:5px;background:#fffbe6;border:1px solid #ffe58f;color:#8a6500;margin-bottom:12px;font-size:13px}
.product-title{white-space:normal;min-width:280px;line-height:1.45}.price{font-weight:700;color:#e65100}.source-note{margin-top:12px;color:#888;font-size:12px}
/* Responsive */
@media(max-width:768px){.sidebar{width:160px}.main-area{padding:16px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ========== State ==========
const BASE = ''
const TOKEN_KEY = 'mgmt_token'
let state = { page: 'login', token: '', user: null, health: null, users: [], ads: [], settings: {}, hotProducts: [], hotKeywords: [], internationalCountry: 'MX', international: null, internationalLoading: false, internationalPage: 1, internationalKeyword: '', pageData: { users: 1, ads: 1, products: 1, keywords: 1 } }
const PAGE_SIZE = 15

// ========== API ==========
async function api(method, url, body) {
  const headers = { 'Content-Type': 'application/json' }
  if (state.token) headers['Authorization'] = 'Bearer ' + state.token
  const opts = { method, headers }
  if (body) opts.body = JSON.stringify(body)
  const res = await fetch(BASE + url, opts)
  const data = await res.json()
  if (data.code === 401 || data.code === 403) { state.token = ''; localStorage.removeItem(TOKEN_KEY); render() }
  return data
}
function get(url) { return api('GET', url) }
function post(url, body) { return api('POST', url, body) }
function put(url, body) { return api('PUT', url, body) }
function del(url) { return api('DELETE', url) }

// ========== Toast ==========
function toast(msg, type = 'success') {
  const el = document.createElement('div')
  el.className = 'toast ' + type
  el.textContent = msg
  document.body.appendChild(el)
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300) }, 2500)
}

// ========== Modal ==========
function showModal(html) {
  const overlay = document.createElement('div')
  overlay.className = 'modal-overlay'
  overlay.innerHTML = `<div class="modal">${html}</div>`
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove() })
  document.body.appendChild(overlay)
  return overlay.querySelector('.modal')
}

// ========== Data loading ==========
async function loadHealth() { state.health = (await get('/api/health')).data }
async function loadUsers() { state.users = (await get('/api/admin/users')).data || [] }
async function loadAds() { state.ads = (await get('/api/admin/ads')).data || [] }
async function loadSettings() { state.settings = (await get('/api/admin/settings')).data || {} }
async function loadHotProducts() { state.hotProducts = (await get('/api/admin/dashboard/hot-products')).data || [] }
async function loadHotKeywords() { state.hotKeywords = (await get('/api/admin/dashboard/hot-keywords')).data || [] }

// ========== Router ==========
async function navigateTo(page) { state.page = page; render(); if (page === 'international' && !state.international) await loadInternational(false) }

// ========== Pagination ==========
function paginate(list, page) {
  const start = (page - 1) * PAGE_SIZE
  return { items: list.slice(start, start + PAGE_SIZE), total: list.length, pages: Math.ceil(list.length / PAGE_SIZE) || 1 }
}

// ========== Render ==========
function render() {
  if (state.page === 'login') return renderLogin()
  if (!state.token) return renderLogin()
  document.getElementById('app').innerHTML = `
    <div class="admin-layout">
      <div class="sidebar">
        <h3>🔧 管理后台</h3>
        <div class="nav">
          ${[
            ['overview','📊 数据概览'],
            ['users','👥 用户管理'],
            ['ads','📢 广告管理'],
            ['settings','⚙️ 系统设置'],
            ['products','🏆 畅销商品榜'],
            ['keywords','🔑 热搜词榜'],
            ['international','🌐 国际购选品']
          ].map(([k,v]) => `<div class="nav-item${state.page===k?' active':''}" onclick="navigateTo('${k}')">${v}</div>`).join('')}
        </div>
        <div class="logout-btn" onclick="handleLogout()">🚪 退出登录</div>
      </div>
      <div class="main-area">${renderPage()}</div>
    </div>`
}

function renderPage() {
  switch (state.page) {
    case 'overview': return renderOverview()
    case 'users': return renderUsers()
    case 'ads': return renderAds()
    case 'settings': return renderSettings()
    case 'products': return renderHotProducts()
    case 'keywords': return renderHotKeywords()
    case 'international': return renderInternational()
    default: return '<h2>404</h2>'
  }
}

// ========== Login ==========
function renderLogin() {
  document.getElementById('app').innerHTML = `
    <div class="login-page">
      <div class="login-box">
        <h2>美客多云管理后台</h2>
        <p>Mercado Libre Admin Panel</p>
        <input type="text" id="loginUser" placeholder="用户名" autocomplete="username">
        <input type="password" id="loginPass" placeholder="密码" autocomplete="current-password">
        <button class="btn" id="loginBtn" onclick="handleLogin()">登 录</button>
        <div class="err" id="loginErr"></div>
        <div class="hint">admin 账号默认密码: admin123</div>
      </div>
    </div>`
  document.getElementById('loginUser').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPass').focus() })
  document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin() })
}
async function handleLogin() {
  const u = document.getElementById('loginUser').value.trim()
  const p = document.getElementById('loginPass').value
  const btn = document.getElementById('loginBtn')
  const err = document.getElementById('loginErr')
  if (!u || !p) { err.textContent = '请输入用户名和密码'; return }
  btn.disabled = true; btn.textContent = '登录中...'
  const res = await post('/api/auth/login', { username: u, password: p })
  btn.disabled = false; btn.textContent = '登 录'
  if (res.code === 0) {
    state.token = res.data.token
    state.user = res.data.user
    localStorage.setItem(TOKEN_KEY, state.token)
    state.page = 'overview'
    await loadHealth(); await loadUsers(); await loadAds(); await loadSettings()
    await loadHotProducts(); await loadHotKeywords()
    render()
    toast('登录成功')
  } else {
    err.textContent = res.message || '登录失败'
  }
}
async function handleLogout() {
  await post('/api/auth/logout')
  state.token = ''
  state.user = null
  localStorage.removeItem(TOKEN_KEY)
  render()
}

// ========== Overview ==========
function renderOverview() {
  const h = state.health || {}
  const usersCount = state.users.length
  const adsCount = state.ads.length
  const productsCount = state.hotProducts.length
  const kwCount = state.hotKeywords.length
  const uptime = h.uptime ? Math.floor(h.uptime) + 's' : '-'
  const ver = h.version ? new Date(h.version).toLocaleString() : '-'
  return `
    <h2>📊 数据概览</h2>
    <div class="stats-grid">
      <div class="stat-card"><div class="num">${usersCount}</div><div class="lbl">注册用户</div></div>
      <div class="stat-card"><div class="num">${adsCount}</div><div class="lbl">广告数量</div></div>
      <div class="stat-card"><div class="num">${productsCount}</div><div class="lbl">畅销商品</div></div>
      <div class="stat-card"><div class="num">${kwCount}</div><div class="lbl">热搜词</div></div>
      <div class="stat-card"><div class="num" style="font-size:16px">${ver}</div><div class="lbl">版本时间</div></div>
      <div class="stat-card"><div class="num" style="font-size:16px">${uptime}</div><div class="lbl">运行时长</div></div>
    </div>
    <div class="card">
      <h3 style="font-size:14px;margin-bottom:12px">ℹ️ 系统信息</h3>
      <table>
        <tr><td style="width:100px;color:#888">后台地址</td><td><a href="/mgmt" target="_blank">/mgmt</a></td></tr>
        <tr><td style="color:#888">API 状态</td><td><span class="tag tag-green">正常</span></td></tr>
        <tr><td style="color:#888">当前用户</td><td>${state.user?.nickname || state.user?.username || '-'}（${state.user?.role||'-'}）</td></tr>
        <tr><td style="color:#888">快捷链接</td><td>
          <a href="${BASE}" target="_blank" class="btn btn-sm btn-primary">打开主站</a>
        </td></tr>
      </table>
    </div>`
}

// ========== Users ==========
function renderUsers() {
  const pg = paginate(state.users, state.pageData.users)
  let html = `
    <h2>👥 用户管理</h2>
    <div class="flex mb-2">
      <button class="btn btn-primary" onclick="showUserModal()">+ 添加用户</button>
      <span style="color:#888;font-size:12px">共 ${pg.total} 个用户</span>
    </div>
    <div class="card"><div class="table-wrap">
    <table>
      <tr><th>ID</th><th>用户名</th><th>昵称</th><th>角色</th><th>有效期</th><th>创建时间</th><th>创建人</th><th>操作</th></tr>
      ${pg.items.map(u => `
        <tr>
          <td>${u.id}</td>
          <td>${u.username}</td>
          <td>${u.nickname || '-'}</td>
          <td>${u.role === 'admin' ? '<span class="tag tag-admin">管理员</span>' : u.role === 'agent' ? '<span class="tag tag-warning">代理</span>' : '<span class="tag tag-blue">用户</span>'}</td>
          <td>${u.validUntil ? new Date(u.validUntil).toLocaleString() : '<span style="color:#999">永久</span>'}</td>
          <td>${u.created_at ? new Date(u.created_at).toLocaleString() : '-'}</td>
          <td>${u.createdBy || '-'}</td>
          <td>${u.username === 'admin' ? `<button class="btn btn-sm btn-primary mr-2" onclick="showUserEditModal('${u.username}')">编辑</button><span style="color:#999">—</span>` : `<button class="btn btn-sm btn-primary mr-2" onclick="showUserEditModal('${u.username}')">编辑</button><button class="btn btn-sm btn-danger" onclick="deleteUser('${u.username}')">删除</button>`}</td>
        </tr>`).join('')}
    </table>
    </div>${renderPagination('users', pg)}</div>`
  return html
}
function showUserModal() {
  const modal = showModal(`
    <h3>添加用户</h3>
    <div class="field"><label>用户名 *</label><input type="text" id="mUser" placeholder="登录名"></div>
    <div class="field"><label>密码 *</label><input type="password" id="mPass" placeholder="登录密码"></div>
    <div class="field"><label>昵称</label><input type="text" id="mNick" placeholder="显示名称"></div>
    <div class="field"><label>角色</label><select id="mRole"><option value="user">普通用户</option><option value="agent">代理</option><option value="admin">管理员</option></select></div>
    <div class="field"><label>有效期至（留空=永久）</label><input type="datetime-local" id="mValid"></div>
    <div class="btns">
      <button class="btn" onclick="this.closest('.modal-overlay').remove()">取消</button>
      <button class="btn btn-primary" onclick="doAddUser()">确定添加</button>
    </div>`)
  modal.querySelector('input').focus()
}
async function doAddUser() {
  const overlay = document.querySelector('.modal-overlay')
  const username = document.getElementById('mUser').value.trim()
  const password = document.getElementById('mPass').value
  if (!username || !password) { toast('用户名和密码不能为空', 'error'); return }
  const res = await post('/api/admin/users', {
    username, password,
    nickname: document.getElementById('mNick').value.trim() || '',
    role: document.getElementById('mRole').value,
    validUntil: document.getElementById('mValid').value || null
  })
  if (res.code === 0) {
    toast('添加成功'); overlay.remove()
    await loadUsers(); render()
  } else { toast(res.message, 'error') }
}
async function deleteUser(username) {
  if (!confirm(`确定删除用户「${username}」？`)) return
  const res = await del('/api/admin/users/' + username)
  if (res.code === 0) { toast('已删除'); await loadUsers(); render() }
  else { toast(res.message, 'error') }
}
function showUserEditModal(username) {
  const u = state.users.find(x => x.username === username)
  if (!u) { toast('用户不存在', 'error'); return }
  const validVal = u.validUntil ? new Date(u.validUntil).toISOString().slice(0, 16) : ''
  const modal = showModal(`
    <h3>编辑用户 - ${username}</h3>
    <div class="field"><label>用户名</label><input type="text" value="${username}" readonly style="background:#f5f5f5"></div>
    <div class="field"><label>新密码（留空不修改）</label><input type="password" id="mEditPass" placeholder="留空则保持原密码"></div>
    <div class="field"><label>昵称</label><input type="text" id="mEditNick" value="${(u.nickname||'').replace(/"/g,'&quot;')}"></div>
    <div class="field"><label>角色</label><select id="mEditRole"><option value="user" ${u.role==='user'?'selected':''}>普通用户</option><option value="agent" ${u.role==='agent'?'selected':''}>代理</option><option value="admin" ${u.role==='admin'?'selected':''}>管理员</option></select></div>
    <div class="field"><label>有效期至（留空=永久）</label><input type="datetime-local" id="mEditValid" value="${validVal}"></div>
    <div class="btns">
      <button class="btn" onclick="this.closest('.modal-overlay').remove()">取消</button>
      <button class="btn btn-primary" onclick="doEditUser('${username}')">保存修改</button>
    </div>`)
}
async function doEditUser(username) {
  const overlay = document.querySelector('.modal-overlay')
  const body = {
    nickname: document.getElementById('mEditNick').value.trim(),
    role: document.getElementById('mEditRole').value,
    validUntil: document.getElementById('mEditValid').value || null
  }
  const pass = document.getElementById('mEditPass').value
  if (pass) body.password = pass
  const res = await put('/api/admin/users/' + username, body)
  if (res.code === 0) { toast('已更新'); overlay.remove(); await loadUsers(); render() }
  else { toast(res.message, 'error') }
}

// ========== Ads ==========
function renderAds() {
  const pg = paginate(state.ads, state.pageData.ads)
  let html = `
    <h2>📢 广告管理</h2>
    <div class="flex mb-2">
      <button class="btn btn-primary" onclick="showAdModal()">+ 添加广告</button>
      <span style="color:#888;font-size:12px">共 ${pg.total} 条广告</span>
    </div>
    <div class="card"><div class="table-wrap">
    <table>
      <tr><th>ID</th><th>标题</th><th>内容</th><th>图片</th><th>链接</th><th>弹窗</th><th>横幅</th><th>状态</th><th>操作</th></tr>
      ${pg.items.map(a => `
        <tr>
          <td>${a.id}</td>
          <td>${a.title}</td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${a.content || '-'}</td>
          <td>${a.imageUrl ? '<a href="' + a.imageUrl + '" target="_blank" style="color:#1a73e8">查看</a>' : '-'}</td>
          <td>${a.linkUrl ? '<a href="' + a.linkUrl + '" target="_blank" style="color:#1a73e8">打开</a>' : '-'}</td>
          <td>${a.popup ? '<span class="tag tag-green">是</span>' : '<span class="tag tag-red">否</span>'}</td>
          <td>${a.banner ? '<span class="tag tag-green">是</span>' : '<span class="tag tag-red">否</span>'}</td>

  return String(value == null ? '' : value).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
}

    <td class="price">${escapeHtml(item.currency)} ${Number(item.price).toLocaleString()}${item.originalPrice?`<br><del style="color:#999;font-weight:400">${Number(item.originalPrice).toLocaleString()}</del>`:''}</td>

  if (pg.pages <= 1) return ''
  const curPage = state.pageData[key] || 1
  return `<div class="pagination">
    <button onclick="changePage('${key}', ${curPage-1})" ${curPage<=1?'disabled':''}>上一页</button>
    <span>第 ${curPage}/${pg.pages} 页</span>
    <button onclick="changePage('${key}', ${curPage+1})" ${curPage>=pg.pages?'disabled':''}>下一页</button>
  </div>`
}
function changePage(key, page) {
  state.pageData[key] = page
  render()
}

// ========== Init ==========
async function init() {
  const saved = localStorage.getItem(TOKEN_KEY)
  if (saved) {
    state.token = saved
    const v = await get('/api/auth/verify')
    if (v.code === 0) {
      state.user = v.data.user
      state.page = 'overview'
      await Promise.all([loadHealth(), loadUsers(), loadAds(), loadSettings(), loadHotProducts(), loadHotKeywords()])
    } else {
      state.token = ''
      localStorage.removeItem(TOKEN_KEY)
    }
  }
  render()
}
init()
</script>
</body>
</html>
